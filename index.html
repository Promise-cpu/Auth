<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LodgeMate</title>
  <style>
    body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    .container { text-align: center; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    button { margin: 10px; padding: 10px 20px; cursor: pointer; border: none; border-radius: 4px; background-color: #3e5eff; color: white; font-weight: bold; }
    button:hover { background-color: #2c46c7; }
    #message { color: #555; margin-bottom: 20px; }
  </style>
</head>
<body>

  <div class="container">
    <h1>Welcome to LodgeMate</h1>
    <p id="message">Checking session...</p>

    <div id="actions" style="display: none;">
      <button id="loginBtn">Login</button>
      <button id="signupBtn">Create Account</button>
    </div>
  </div>

  <!-- Load Supabase library first -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    // 1. Configuration
    const supabaseUrl = "https://tabdzfwojeibimaxumex.supabase.co";
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRhYmR6ZndvamVpYmltYXh1bWV4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzNTUzMzcsImV4cCI6MjA5MzkzMTMzN30.yPt5Q_pceK_81_ou-MBDZhYWhKPKNCs7vDus5MxBrEY";

    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    const messageEl = document.getElementById("message");
    const actionsEl = document.getElementById("actions");

    // 2. Session Check
    async function checkUser() {
      try {
        const { data: { user }, error } = await supabase.auth.getUser();

        if (user) {
          messageEl.innerText = "Redirecting to dashboard...";
          window.location.href = "dashboard.html";
        } else {
          messageEl.innerText = "Please login or create an account.";
          actionsEl.style.display = "block"; // Only show buttons if NOT logged in
        }
      } catch (err) {
        console.error("Auth error:", err);
        messageEl.innerText = "Something went wrong. Please refresh.";
      }
    }

    // 3. Navigation Handlers
    document.getElementById("loginBtn").addEventListener("click", () => {
      console.log("Navigating to login...");
      window.location.href = "login.html";
    });

    document.getElementById("signupBtn").addEventListener("click", () => {
      console.log("Navigating to signup...");
      window.location.href = "signup.html";
    });

    // Start
    checkUser();
  </script>

</body>
</html>
