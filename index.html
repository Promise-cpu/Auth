<!DOCTYPE html>
<html>
<head>
  <title>LodgeMate</title>
</head>
<body>

  <h1>Welcome to LodgeMate</h1>

  <p id="message">Checking session...</p>

  <button onclick="goLogin()">
    Login
  </button>

  <button onclick="goSignup()">
    Create Account
  </button>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <script>

    // Supabase setup
    const supabaseUrl =
      "https://tabdzfwojeibimaxumex.supabase.co"

    const supabaseKey =
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRhYmR6ZndvamVpYmltYXh1bWV4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzNTUzMzcsImV4cCI6MjA5MzkzMTMzN30.yPt5Q_pceK_81_ou-MBDZhYWhKPKNCs7vDus5MxBrEY"

    const supabase = window.supabase.createClient(
      supabaseUrl,
      supabaseKey
    )



    // Check if user is logged in
    async function checkUser() {

      const message =
        document.getElementById("message")

      try {

        const {
          data: { user },
          error
        } = await supabase.auth.getUser()



        // Handle errors
        if (error) {
          message.innerText =
            "Could not verify session."
          return
        }



        // Redirect logged-in users
        if (user) {
          window.location.href =
            "dashboard.html"
        } else {
          message.innerText =
            "Please login or create an account."
        }

      } catch (err) {

        message.innerText =
          "Something went wrong."

      }
    }



    // Navigation functions
    function goLogin() {
      window.location.href =
        "login.html"
    }

    function goSignup() {
      window.location.href =
        "signup.html"
    }



    // Run session check
    checkUser()

  </script>

</body>
</html>
