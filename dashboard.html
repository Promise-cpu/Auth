<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
</head>
<body>

  <h1>Dashboard</h1>

  <p id="user">Loading user...</p>

  <button id="logoutBtn" onclick="logout()">
    Logout
  </button>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <script>

    // Supabase setup
    const supabaseUrl =
      "https://tabdzfwojeibimaxumex.supabase.co"

    const supabaseKey =
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRhYmR6ZndvamVpYmltYXh1bWV4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzNTUzMzcsImV4cCI6MjA5MzkzMTMzN30.yPt5Q_pceK_81_ou-MBDZhYWhKPKNCs7vDus5MxBrEY"

    const supabase = window.supabase.createClient(
      supabaseUrl,
      supabaseKey
    )



    // Load current user
    async function loadUser() {

      const userText =
        document.getElementById("user")

      try {

        const {
          data: { user },
          error
        } = await supabase.auth.getUser()



        // Handle errors
        if (error) {
          userText.innerText =
            "Could not load user."
          return
        }



        // Redirect if not logged in
        if (!user) {
          window.location.href =
            "login.html"
          return
        }



        // Show user email
        userText.innerText =
          "Welcome " + user.email

      } catch (err) {

        userText.innerText =
          "Something went wrong."

      }
    }



    // Logout function
    async function logout() {

      const button =
        document.getElementById("logoutBtn")

      button.disabled = true
      button.innerText = "Logging out..."



      await supabase.auth.signOut()



      window.location.href =
        "index.html"
    }



    // Run auth check
    loadUser()

  </script>

</body>
</html>
