<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
</head>
<body>

  <h1>Login</h1>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="login()">Login</button>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <script>
    const supabaseUrl = "https://tabdzfwojeibimaxumex.supabase.co"
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRhYmR6ZndvamVpYmltYXh1bWV4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzNTUzMzcsImV4cCI6MjA5MzkzMTMzN30.yPt5Q_pceK_81_ou-MBDZhYWhKPKNCs7vDus5MxBrEY"

    const supabase = window.supabase.createClient(
      supabaseUrl,
      supabaseKey
    )

    async function login() {
      const email = document.getElementById("email").value
      const password = document.getElementById("password").value

      // 1. Login user
      const { data, error } = await supabase.auth.signInWithPassword({
        email,
        password
      })

      // 2. Handle errors
      if (error) {
        alert(error.message)
        return
      }

      // 3. Ensure session exists
      if (data.session) {
        window.location.href = "dashboard.html"
      }
    }
  </script>

</body>
</html>
